<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AWS Hosted Page</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #ffffff;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 480px;
            width: 90%;
        }
        h1 { color: #1e3c72; margin-bottom: 5px; font-size: 26px; }
        .subtitle { color: #777; margin-bottom: 25px; font-size: 14px; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            gap: 15px;
        }
        .label { font-weight: 600; color: #2a5298; white-space: nowrap; }
        .value { color: #333; text-align: right; }
        .footer { margin-top: 25px; text-align: center; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hosted on Amazon EC2</h1>
        <p class="subtitle">Nginx Web Server Deployment</p>

        <div class="info-row">
            <span class="label">Name</span>
            <span class="value">Sireesha Manku</span>
        </div>
        <div class="info-row">
            <span class="label">College</span>
            <span class="value">Siddartha Educational Academy Group of Institutions, Tirupati (Affiliated to JNTUA)</span>
        </div>
        <div class="info-row">
            <span class="label">Branch</span>
            <span class="value">Computer Science and Engineering</span>
        </div>
        <div class="info-row">
            <span class="label">Email</span>
            <span class="value">sireeshamanku24@gmail.com</span>
        </div>
        <div class="info-row">
            <span class="label">Current Date</span>
            <span class="value">09-07-2026</span>
        </div>

        <div class="footer">Deployed via EC2 &bull; Task 3</div>
    </div>
</body>
</html>
